name: CI — Lint + Tests + Eval Gate

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run ruff lint
        run: ruff check src/ tests/ examples/ evals/
      - name: Run ruff format check
        run: ruff format --check src/ tests/ examples/ evals/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run pytest with coverage
        run: pytest tests/ --cov=src/governance --cov-report=term-missing --cov-fail-under=80

  eval-gate:
    name: Eval Gate (adversarial scenarios)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run eval gate
        run: PYTHONPATH=$(pwd) python evals/run_evals.py
      - name: Upload audit logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-audit-logs
          path: audit_logs/
          if-no-files-found: ignore

  demo-smoke-test:
    name: Demo Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install ".[dev]"
      - name: Run example 01 (ungoverned)
        run: python -m examples.01_ungoverned_agent
      - name: Run example 02 (governed)
        run: python -m examples.02_governed_agent
      - name: Run example 03 (multi-agent delegation)
        run: python -m examples.03_multi_agent_delegation
      - name: Run example 04 (high-risk approval)
        run: python -m examples.04_high_risk_approval
